apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Evogene1/teamcity_argocd.git' # Перевір чи URL вірний (був test-argocd)
    targetRevision: main
    path: projects/dev  # !!! ОСЬ ЦЕ ТРЕБА ЗМІНИТИ
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true